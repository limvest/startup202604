  - date: "2024-10"
    title_en: "NEA Draft Rules for Distributed Solar — New Project Classifications and Market Trading Requirements"
    title_cn: "国家能源局《分布式光伏发电开发建设管理办法（征求意见稿）》"
    issuer: "NEA"
    phase: "post-subsidy"
    impact_summary: >
      NEA's draft rules (consultation Oct 9–Nov 8, 2024) replaced the 2013 framework and
      introduced tiered project categories: residential, C&I general (≤6 MW), C&I large-scale
      (6-50 MW), and ground-mounted (>50 MW, no longer "distributed"). Critically, the rules
      eliminated guaranteed grid access for distributed solar and required all projects to
      participate in electricity market trading. Large-scale C&I projects were restricted to
      full self-consumption with anti-reverse-flow systems. A queue system for grid connections
      replaced first-come-first-served access. For installers and financiers, this fundamentally
      changed project bankability analysis, requiring electricity market forecasting rather than
      simple feed-in tariff math.
    downstream_segments_affected:
      - residential_installation
