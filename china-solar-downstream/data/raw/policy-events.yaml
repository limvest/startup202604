      The distributed subsidy was slashed from 0.37 to 0.32 CNY/kWh. Annual installations
      collapsed from an anticipated 55 GW to ~44 GW. Hundreds of small residential installers
      lost signed contracts overnight, financing companies saw project IRRs turn negative,
      and equipment prices crashed 30-40% within weeks. The abruptness earned the policy
      the nickname "急刹车" (emergency brake).
