  - date: "2025-04"
    title_en: "Anti-Involution National Strategy — Quality Over Quantity for Solar Industry"
    title_cn: "国家层面反内卷政策（2025年战略方向）"
    issuer: "State Council"
    phase: "post-subsidy"
    impact_summary: >
      Beijing elevated anti-involution (反内卷) to a national industrial strategy in early 2025,
      targeting the destructive price competition that had pushed solar module prices to
      unsustainable lows (below USD0.10/W by late 2024). Downstream installers benefited
      from anticipated price floor stabilization, which improved project margin predictability.
      For ecommerce platforms and equipment distributors, the policy threatened to reduce
      the commodity-like price competition that had driven volume. The strategy signaled
      a deliberate market structure shift — fewer, larger, more profitable participants —
      affecting consolidation dynamics across the entire downstream value chain.
    downstream_segments_affected:
