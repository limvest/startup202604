  - date: "2025-02"
    title_en: "Document 136 — Grid Connection Agreement Required Before Construction"
    title_cn: "国家能源局等《关于促进新能源高质量消纳的实施方案》（136号文）"
    issuer: "NEA"
    phase: "post-subsidy"
    impact_summary: >
      Document 136 required all new solar and wind projects to secure formal grid connection
      and electricity absorption agreements before breaking ground — ending speculative
      construction practices that had contributed to the grid-connection backlog. For
      residential installers, this introduced new pre-sales compliance steps; for C&I project
      developers, it imposed meaningful upfront grid-capacity due diligence costs. Financing
      companies gained clarity on grid-connected project certainty but faced a longer
      pre-disbursement timeline. The policy effectively cleaned up the pipeline of stranded
      projects built without grid offtake.
